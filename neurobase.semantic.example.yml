# NeuroBase Semantic Model (optional)
# Define business concepts so the AI reasons in business terms
# Copy to neurobase.semantic.yml and customize for your database

entities:
  - name: Client
    table: customers
    description: "People who purchase products"
    metrics:
      - name: total_revenue
        expression: "SUM(orders.total_amount)"
        description: "Total revenue generated by this client"
      - name: order_count
        expression: "COUNT(orders.id)"
        description: "Number of orders placed"
    relationships:
      - target: Order
        type: one_to_many
        join: "customers.id = orders.customer_id"

  - name: Order
    table: orders
    description: "Purchase transactions"
    metrics:
      - name: average_value
        expression: "AVG(total_amount)"
    relationships:
      - target: Product
        type: many_to_many
        join: "orders.id = order_items.order_id AND order_items.product_id = products.id"

  - name: Product
    table: products
    description: "Items available for purchase"
    metrics:
      - name: total_sold
        expression: "SUM(order_items.quantity)"
      - name: revenue
        expression: "SUM(order_items.quantity * order_items.unit_price)"
    relationships:
      - target: Category
        type: one_to_many
        join: "products.category_id = categories.id"
